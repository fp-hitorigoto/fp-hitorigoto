name: 毎朝自動記事生成

on:
  # 毎朝7時（JST）に自動実行 = 22:00 UTC
  schedule:
    - cron: '0 22 * * *'
  # 手動でも実行できるようにする
  workflow_dispatch:

jobs:
  generate-articles:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    permissions:
      contents: write

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 3.11 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: 依存パッケージをインストール
        run: pip install -r scripts/requirements.txt

      - name: 記事を自動生成
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/fetch_and_generate.py

      - name: 新しい記事をコミット・プッシュ
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions"
          git add src/content/articles/ scripts/processed_items.json || true
          git diff --staged --quiet || git commit -m "chore: 自動記事生成 $(date '+%Y-%m-%d')"
          git push
